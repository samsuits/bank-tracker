services:
  app:
    build: .
    container_name: bank_app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - node_modules:/app/node_modules
    ports:
      - "8000:8000"
      - "5173:5173"   # 🔥 ADD THIS
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: bank_db
    restart: always
    environment:
      MYSQL_DATABASE: bank_tracker
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql   # ✅ IMPORTANT

volumes:
  db_data:
  node_modules: